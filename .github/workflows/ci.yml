name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Quality PHP ${{ matrix.php }} / TYPO3 ${{ matrix.typo3 }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']
        typo3: ['^13.4', '^14.3']
    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, intl, json, simplexml, libxml, mbstring, pdo_sqlite
          tools: composer:v2
          coverage: none

      - name: Install dependencies for TYPO3 ${{ matrix.typo3 }}
        run: |
          TYPO3_MAJOR=$(echo "${{ matrix.typo3 }}" | cut -d. -f1 | tr -d '^')
          composer require --no-update \
            typo3/cms-core:"${{ matrix.typo3 }}" \
            typo3/cms-fluid:"${{ matrix.typo3 }}" \
            typo3/cms-extbase:"${{ matrix.typo3 }}" \
            typo3/cms-backend:"${{ matrix.typo3 }}" \
            typo3/cms-install:"${{ matrix.typo3 }}" \
            typo3/testing-framework:^9.3
          composer update --no-interaction --no-progress

      - name: Coding standards
        run: composer cs

      - name: PHPStan
        run: composer phpstan

      - name: Linters
        run: composer lint:all

      - name: Unit tests
        run: composer test:unit

  functional:
    name: Functional (${{ matrix.db }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        db: [sqlite, mariadb, mysql]
    services:
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: funcp
          MYSQL_DATABASE: func_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s --health-timeout=5s --health-retries=5
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: funcp
          MYSQL_DATABASE: func_test
        ports:
          - 3307:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -pfuncp"
          --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, intl, json, simplexml, libxml, mbstring, pdo_sqlite, pdo_mysql
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: |
          composer require --no-update typo3/testing-framework:^9.3
          composer update --no-interaction --no-progress

      - name: Functional tests (sqlite)
        if: matrix.db == 'sqlite'
        run: composer test:functional

      - name: Functional tests (mariadb)
        if: matrix.db == 'mariadb'
        env:
          typo3DatabaseDriver: pdo_mysql
          typo3DatabaseName: func_test
          typo3DatabaseUsername: root
          typo3DatabasePassword: funcp
          typo3DatabaseHost: 127.0.0.1
          typo3DatabasePort: 3306
        run: composer test:functional

      - name: Functional tests (mysql)
        if: matrix.db == 'mysql'
        env:
          typo3DatabaseDriver: pdo_mysql
          typo3DatabaseName: func_test
          typo3DatabaseUsername: root
          typo3DatabasePassword: funcp
          typo3DatabaseHost: 127.0.0.1
          typo3DatabasePort: 3307
        run: composer test:functional

  acceptance:
    name: Acceptance (Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, intl, json, simplexml, libxml, mbstring, pdo_sqlite
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: |
          composer require --no-update typo3/testing-framework:^9.3
          composer update --no-interaction --no-progress

      - name: Build Codeception actors
        run: .Build/bin/codecept build -c codeception.yml

      - name: Acceptance tests via runTests.sh
        run: bash Build/Scripts/runTests.sh -b docker -s acceptance -d sqlite
