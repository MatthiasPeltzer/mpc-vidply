name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  php:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']
    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, json, simplexml, libxml, mbstring, pdo_sqlite
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --no-progress

      - name: Coding standards
        run: composer cs

      - name: PHPStan
        run: composer phpstan

      - name: Unit tests
        run: composer test:unit

  functional:
    name: Functional (PHP 8.2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, json, simplexml, libxml, mbstring, pdo_sqlite
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --no-progress

      - name: Functional tests
        run: composer test:functional

  typo3-13:
    name: TYPO3 13.4 (PHP 8.2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, intl, json, simplexml, libxml, mbstring, pdo_sqlite
          tools: composer:v2
          coverage: none

      - name: Install dependencies for TYPO3 13.4
        run: |
          composer config audit.block-insecure false
          composer require \
            typo3/cms-core:^13.4 \
            typo3/cms-fluid:^13.4 \
            typo3/cms-extbase:^13.4 \
            --with-all-dependencies \
            --no-interaction \
            --no-progress

      - name: Unit tests
        run: composer test:unit

      - name: Functional tests
        run: composer test:functional
