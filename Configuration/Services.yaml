# VidPly Extension - Dependency Injection Configuration

services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  Mpc\MpcVidply\:
    resource: '../Classes/*'
    exclude:
      - '../Classes/Enums/*'
      - '../Classes/OnlineMedia/Helpers/ExternalMediaDomainValidationTrait.php'

  # DataProcessors are instantiated via GeneralUtility::makeInstance() from
  # TypoScript, so they must be marked public for the service locator fallback
  # in their constructors to resolve dependencies.
  Mpc\MpcVidply\DataProcessing\VidPlyProcessor:
    public: true

  Mpc\MpcVidply\DataProcessing\ListviewProcessor:
    public: true

  Mpc\MpcVidply\DataProcessing\DetailProcessor:
    public: true

  # Page-level DataProcessor rewriting the breadcrumb on detail views; resolved
  # via the service container when referenced from TypoScript.
  Mpc\MpcVidply\DataProcessing\DetailBreadcrumbProcessor:
    public: true

  # Page title provider; TYPO3 resolves it via makeInstance(), marking it public
  # ensures autowired dependencies (DetailRequestResolver) are available.
  Mpc\MpcVidply\PageTitle\VidPlyDetailPageTitleProvider:
    public: true

  Mpc\MpcVidply\Service\DetailRequestResolver:
    public: true

  # Preview renderers are resolved by TYPO3 core via the service container when
  # registered on a CE type's `previewRenderer` entry.
  Mpc\MpcVidply\Backend\Preview\VidPlyPreviewRenderer:
    public: true

  Mpc\MpcVidply\Backend\Preview\ListviewPreviewRenderer:
    public: true

  Mpc\MpcVidply\EventListener\RegisterOnlineMediaIconsEventListener:
    tags:
      - name: event.listener
        identifier: 'mpc/mpc-vidply/register-online-media-icons'
        event: TYPO3\CMS\Core\Core\Event\BootCompletedEvent
